# Railway config for the HTTP backend service.
#
# In the Railway service settings, set:
#   - Root Directory        : /            (the monorepo root — pnpm workspace lives here)
#   - Config-as-code path    : apps/http-backend/railway.toml
#
# Railway/Nixpacks auto-detects pnpm and runs `pnpm install` at the root, which
# installs the whole workspace. The build below builds ONLY this service and its
# internal dependencies (@repo/db, @repo/backend-common, @repo/zod-validation),
# including `prisma generate` (run inside @repo/db's build).
#
# We use pnpm's own recursive filter (`<pkg>...` = the package AND its workspace
# dependencies, in topological order) instead of `turbo`, because the root
# `turbo` binary isn't guaranteed to be on PATH during Railway's build step
# (which caused "Command \"turbo\" not found"). pnpm is always available.
#
# `pnpm install --prod=false` is REQUIRED: the service has NODE_ENV=production,
# and pnpm skips devDependencies in production mode. But `tsc` / `prisma` live in
# devDependencies and are needed to BUILD, so we force a full install first
# (otherwise the build fails with "tsc: not found"). Runtime deps are what ship;
# devDeps are only used during this build step.
#
# Required service variables: DATABASE_URL, JWT_SECRET, FRONTEND_URL, NODE_ENV=production
# (PORT is provided automatically by Railway.)

[build]
builder = "nixpacks"
buildCommand = "pnpm install --prod=false && pnpm --filter http-backend... run build"

[deploy]
startCommand = "pnpm --filter http-backend start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
